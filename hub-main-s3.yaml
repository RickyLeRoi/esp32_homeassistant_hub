# ============================================================
#  MAIN HUB — ESP32-S3-N16R8
#
#  This file is the ESPHome configuration for the main hub
#  device. ESPHome converts this YAML into C++ code that is
#  compiled and flashed onto the ESP32.
#
#  Connected hardware:
#    - INMP441  : digital I2S microphone (GPIO10/11/12)
#    - MAX98357A: I2S amplifier/speaker (GPIO13/14/15)
#    - BME280   : temperature/humidity/pressure on I2C (GPIO8/9)
#    - BH1750   : light sensor on I2C (GPIO8/9)
#    - SSD1306  : OLED display 128x64 on I2C (GPIO8/9)
#    - WS2812   : on-board RGB LED (GPIO48)
#    - ESP32-C6 : Thread node connected via UART (GPIO16/17)
#    - 4 buttons: DND, Vol+, Vol-, Assistant (GPIO4–7)
# ============================================================

# ── SUBSTITUTIONS ───────────────────────────────────────────
# Substitutions are variables: ${device_name} is replaced with
# the value defined here throughout the file.
# Useful to avoid repeating the same value in multiple places.
# I used hub-terra and hub-taverna because I have two of these hubs in different rooms, but you can choose any name you like.
substitutions:
  device_name: hub-main
  friendly_name: "Hub - Main"

# ── ESPHOME BASE CONFIG ──────────────────────────────────────
# "name" is the mDNS name: the device will be reachable as
# hub-main.local on the local network.
# on_boot runs once after startup.
# priority: -100 = "run last", after all components have
# been initialised.
esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  # includes: adds C++ headers to the YAML lambda functions.
  # hub_includes.h contains ESP-IDF #includes needed by the
  # diagnostics lambdas (chip info, flash, heap, wifi, netif).
  includes:
    - hub_includes.h
  on_boot:
    # priority: 800 → run early but AFTER the logger (priority 900)
    # has initialised the serial port.
    priority: 800
    then:
      # Stop BLE scanning immediately so that internal RAM is free
      # for micro_wake_word to allocate its tensor arena (~17 KB).
      # BLE will be re-enabled after 15s by ble_delayed_start.
      - esp32_ble_tracker.stop_scan:
      # Wait for the USB serial connection to stabilise.
      # Without this delay the first ESP_LOGI messages are lost
      # because the PC USB-CDC driver has not yet opened the port.
      - delay: 2s
      # ── Print system information at boot ─────────────────────
      # ESP_LOGI("tag", ...) writes to the log under the "hub" tag.
      # CONFIG_* values are compile-time constants generated by the
      # Espressif SDK (sdkconfig.h).
      # heap_caps_get_*: ESP-IDF API to read RAM statistics.
      - lambda: |-
          esp_chip_info_t chip;
          esp_chip_info(&chip);
          uint32_t flash_size = 0;
          esp_flash_get_size(NULL, &flash_size);
          size_t ram_tot = heap_caps_get_total_size(MALLOC_CAP_INTERNAL);
          size_t ram_lib = heap_caps_get_free_size(MALLOC_CAP_INTERNAL);
          size_t psr_tot = heap_caps_get_total_size(MALLOC_CAP_SPIRAM);
          size_t psr_lib = heap_caps_get_free_size(MALLOC_CAP_SPIRAM);
          ESP_LOGI("hub", "╔══ SYSTEM INFO ════════════════════════════════════╗");
          ESP_LOGI("hub", "║  ESPHome  : " ESPHOME_VERSION);
          ESP_LOGI("hub", "║  IDF      : %s", esp_get_idf_version());
          ESP_LOGI("hub", "║  Chip     : %s  rev.%d", CONFIG_IDF_TARGET, chip.revision);
          ESP_LOGI("hub", "║  CPU      : %d core(s) @ %d MHz",
                   chip.cores, CONFIG_ESP32S3_DEFAULT_CPU_FREQ_MHZ);
          ESP_LOGI("hub", "║  Features : WiFi=%s  BT=%s  BLE=%s",
                   (chip.features & CHIP_FEATURE_WIFI_BGN) ? "si" : "no",
                   (chip.features & CHIP_FEATURE_BT)       ? "si" : "no",
                   (chip.features & CHIP_FEATURE_BLE)      ? "si" : "no");
          ESP_LOGI("hub", "║  Flash    : %lu MB",
                   (unsigned long)(flash_size / (1024UL * 1024UL)));
          ESP_LOGI("hub", "║  RAM int  : %u KB liberi / %u KB totali",
                   (unsigned)(ram_lib / 1024), (unsigned)(ram_tot / 1024));
          ESP_LOGI("hub", "║  PSRAM    : %u KB liberi / %u KB totali",
                   (unsigned)(psr_lib / 1024), (unsigned)(psr_tot / 1024));
          ESP_LOGI("hub", "║  Heap     : %u KB liberi (minimo boot: %u KB)",
                   (unsigned)(esp_get_free_heap_size() / 1024),
                   (unsigned)(esp_get_minimum_free_heap_size() / 1024));
          ESP_LOGI("hub", "╚═══════════════════════════════════════════════════╝");
      - script.execute: led_stato_riposo    # blue breathing LED
      - micro_wake_word.start:              # start wake word listening
      - script.execute: valuta_display      # adjust OLED brightness
      - script.execute: ble_delayed_start   # start BLE scan after 15s

# ── ESP32-S3 HARDWARE CONFIG ─────────────────────────────────
# board: physical board model (affects available pins).
# variant: chip variant (s3, c3, c6, etc.).
# framework esp-idf: more powerful than Arduino, required by audio
#   and micro_wake_word. sdkconfig_options are Espressif kernel
#   options (equivalent to a Linux .config file).
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"   # CPU at 240MHz (maximum)
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"        # data cache 64KB
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"    # cache line size 64B
      CONFIG_AUDIO_BOARD_CUSTOM: "y"             # custom audio board
      # ── Flash 16MB (N16) ──────────────────────────────────
      CONFIG_ESPTOOLPY_FLASHSIZE_16MB: "y"
      CONFIG_ESPTOOLPY_FLASHSIZE: "16MB"
      # ── PSRAM 8MB OPI (R8) ─────────────────────────────────
      # FETCH_INSTRUCTIONS: code is executed from PSRAM
      #   → frees tens of KB of internal RAM for audio/wake_word.
      # RODATA: constants (fonts, tables, TFLite models) in PSRAM.
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      # Allocations >8KB go to PSRAM automatically.
      # Low threshold: tensor arena (~17KB) and audio ring buffers
      # are placed in PSRAM, freeing internal RAM for the system.
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "8192"
      # ── BLE in PSRAM ───────────────────────────────────────
      # NimBLE (BLE stack on ESP32-S3 / IDF 5.x) allocates its
      # buffers in internal RAM by default. This option moves them
      # entirely to PSRAM, freeing ~50KB of internal RAM that would
      # otherwise prevent coexistence with micro_wake_word.
      CONFIG_BT_NIMBLE_MEM_ALLOC_MODE_EXTERNAL: "y"
      # BLE controller allocates permanent blocks in PSRAM instead
      # of internal RAM (requires SPIRAM, already configured above).
      CONFIG_BT_CTRL_PERM_ALLOC_EXTERNAL: "y"

# ── PSRAM ────────────────────────────────────────────────────
# The N16R8 has 8MB of OPI PSRAM (octal interface at 80MHz).
# Without this section PSRAM is not initialised and the wake word
# model cannot allocate its tensor arena.
psram:
  mode: octal
  speed: 80MHz

# ── WIFI ─────────────────────────────────────────────────────
# Credentials are read from secrets.yaml (never hard-coded!).
# "ap" is an emergency access point: if the main WiFi is not
# reachable the ESP creates its own network to allow
# reconfiguration via browser (see captive_portal below).
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    then:
      - logger.log: "WiFi connected"
      # ── Print WiFi info on connection ────────────────────────
      # esp_wifi_sta_get_ap_info: returns data for the connected AP
      # (SSID, RSSI, channel, BSSID).
      # esp_netif_get_default_netif: gets the active network interface
      # (WIFI_STA) to read IP, gateway and netmask.
      - lambda: |-
          ESP_LOGI("hub", "╔══ WIFI INFO ════════════════════════════════════╗");
          wifi_ap_record_t ap;
          if (esp_wifi_sta_get_ap_info(&ap) == ESP_OK) {
            uint8_t mac[6];
            esp_wifi_get_mac(WIFI_IF_STA, mac);
            ESP_LOGI("hub", "║  SSID    : %s", (char*)ap.ssid);
            ESP_LOGI("hub", "║  RSSI    : %d dBm", ap.rssi);
            ESP_LOGI("hub", "║  Canale  : %d", ap.primary);
            ESP_LOGI("hub", "║  BSSID   : %02x:%02x:%02x:%02x:%02x:%02x",
                     ap.bssid[0], ap.bssid[1], ap.bssid[2],
                     ap.bssid[3], ap.bssid[4], ap.bssid[5]);
            ESP_LOGI("hub", "║  MAC STA : %02x:%02x:%02x:%02x:%02x:%02x",
                     mac[0], mac[1], mac[2], mac[3], mac[4], mac[5]);
          }
          esp_netif_t *sta = esp_netif_get_default_netif();
          if (sta) {
            esp_netif_ip_info_t ip_info;
            esp_netif_get_ip_info(sta, &ip_info);
            char ip_s[16], gw_s[16], nm_s[16];
            esp_ip4addr_ntoa(&ip_info.ip,      ip_s, sizeof(ip_s));
            esp_ip4addr_ntoa(&ip_info.gw,      gw_s, sizeof(gw_s));
            esp_ip4addr_ntoa(&ip_info.netmask, nm_s, sizeof(nm_s));
            ESP_LOGI("hub", "║  IP      : %s", ip_s);
            ESP_LOGI("hub", "║  Gateway : %s", gw_s);
            ESP_LOGI("hub", "║  Netmask : %s", nm_s);
          }
          ESP_LOGI("hub", "╚═════════════════════════════════════════════════╝");
      - script.execute: led_stato_riposo
  on_disconnect:
    then:
      - logger.log:
          level: WARN
          format: "WiFi disconnected!"
      - script.execute: led_stato_no_wifi
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

# ── CAPTIVE PORTAL ───────────────────────────────────────────
# When the ESP is in emergency AP mode, the captive portal shows
# a web page to configure WiFi credentials.
captive_portal:

# ── WEB SERVER ───────────────────────────────────────────────
# Serves an HTTP page at http://${device_name}.local (or by IP).
# Shows all entities: sensors, switches, lights, buttons.
# The "LOGS" tab streams log messages in real time.
# The "OTA" tab allows firmware updates via browser.
# version: 2 → classic UI with the LOG tab included.
web_server:
  port: 80
  version: 2
  log: true

# ── LOGGER ───────────────────────────────────────────────────
# Prints messages to the serial port and via the ESPHome API.
# level: DEBUG shows internal details of every component.
# Available levels (increasing verbosity):
#   NONE, ERROR, WARN, INFO, CONFIG, DEBUG, VERBOSE, VERY_VERBOSE
# baud_rate: 115200 → standard baud rate for UART0 / USB-bridge.
# logs: overrides the level per component, useful to silence
#   very noisy subsystems.
logger:
  level: DEBUG
  baud_rate: 115200
  logs:
    # WiFi is very noisy: keep it at WARN
    wifi: WARN
    # Sensors update frequently: avoid log flooding
    sensor: WARN

# ── HOME ASSISTANT API ───────────────────────────────────────
# Allows Home Assistant to connect to the ESP.
# Encryption key is stored in secrets.yaml.
# on_client_connected/disconnected update the LED colour.
api:
  encryption:
    key: !secret api_key
  on_client_connected:
    then:
      - logger.log: "Home Assistant connected"
      - script.execute: led_stato_riposo
  on_client_disconnected:
    then:
      - logger.log:
          level: WARN
          format: "Home Assistant disconnected"
      - script.execute: led_stato_no_wifi

# ── OTA (Over The Air updates) ───────────────────────────────
# Allows firmware updates over WiFi without a USB cable.
# After the first USB flash, all subsequent updates are done
# with: esphome run hub_main.yaml
ota:
  - platform: esphome
    password: !secret ota_password

# ── BLUETOOTH PROXY ──────────────────────────────────────────
# With CONFIG_BT_NIMBLE_MEM_ALLOC_MODE_EXTERNAL the NimBLE stack
# uses PSRAM instead of internal RAM and can coexist with
# micro_wake_word.
# active: true → active proxy: the ESP32 can open GATT connections
#   to BLE devices to send commands (SwitchBot Bot, Plug).
#   Required by all devices that cannot be controlled through
#   passive advertisements alone and need a connection.
bluetooth_proxy:
  active: true

# esp32_ble_tracker runs a continuous BLE scan (radio always listening).
# The device list is cleared every 15s by the interval block, giving
# a fresh snapshot of visible devices at that moment.
# MAC deduplication: each device appears only once per cycle.
# on_ble_advertise: adds the device only if its MAC is not already
#   in the list (avoids duplicates within the 15s window).
esp32_ble_tracker:
  scan_parameters:
    # interval: time between the start of two consecutive scan windows.
    # window: effective listening duration per window.
    # Duty cycle = window/interval = 1s/15s ≈ 7%.
    # The ESP32-S3 shares the 2.4GHz radio between WiFi and BLE:
    # a lower duty cycle reduces contention and improves
    # WiFi stability and audio quality.
    interval: 15s          # pause between windows — duty cycle ~7%
    window: 1s             # listening duration per window
    active: true           # active scan: required for Bot/Plug/Curtain
  on_ble_advertise:
    - then:
        - lambda: |-
            // Add device only if its MAC is not already in the list
            if (id(ble_scan_results).find(x.address_str()) == std::string::npos
                && id(ble_scan_results).length() < 900) {
              char buf[80];
              const char* nm = x.get_name().empty() ? "Unknown" : x.get_name().c_str();
              snprintf(buf, sizeof(buf), "%s (%s) %ddBm\n",
                       nm, x.address_str().c_str(), x.get_rssi());
              id(ble_scan_results) += std::string(buf);
            }

# ── I2C BUS ──────────────────────────────────────────────────
# BME280, BH1750 and SSD1306 share the same I2C bus.
# scan: true → at boot, prints to the log the addresses of all
#   devices found on the bus (useful to verify wiring).
# Typical addresses:
#   0x76 or 0x77 → BME280 (depends on SDO pin)
#   0x23 or 0x5C → BH1750 (depends on ADDR pin)
#   0x3C or 0x3D → SSD1306 (depends on SA0 pin)
i2c:
  sda: GPIO8
  scl: GPIO9
  scan: true           # print found devices to the log at boot
  frequency: 400kHz   # fast mode (400kHz vs standard 100kHz)

# ── I2S AUDIO ────────────────────────────────────────────────
# I2S (Inter-IC Sound) is a digital audio protocol.
# One bus is needed for the microphone (input) and one for the
# speaker (output), each with:
#   BCLK (bit clock) — clock for individual bits
#   LRCLK/WS (left-right clock) — selects L or R channel
#   DATA — stream of audio samples
i2s_audio:
  # Microphone bus — INMP441
  - id: i2s_mic_bus
    i2s_lrclk_pin: GPIO10   # WS  (Word Select / Left-Right clock)
    i2s_bclk_pin:  GPIO11   # SCK (Serial Clock / Bit Clock)
  # Speaker bus — MAX98357A
  - id: i2s_spk_bus
    i2s_lrclk_pin: GPIO13   # LRC
    i2s_bclk_pin:  GPIO14   # BCLK

# ── MICROPHONE ───────────────────────────────────────────────
# INMP441: 32-bit digital I2S microphone, left channel.
# pdm: false → uses standard I2S (not PDM as found in cheap
#   smartphone microphones). The INMP441 is native I2S.
microphone:
  - platform: i2s_audio
    id: hub_mic
    i2s_audio_id: i2s_mic_bus
    i2s_din_pin: GPIO12      # SD (Serial Data)
    adc_type: external       # ADC built into the microphone
    pdm: false               # standard I2S, not PDM
    bits_per_sample: 32bit
    channel: left            # INMP441 uses the left channel

# ── SPEAKER ──────────────────────────────────────────────────
# MAX98357A: 3W mono I2S amplifier with integrated DAC.
# i2s_mode: primary → the ESP32 generates the clocks (I2S master).
speaker:
  - platform: i2s_audio
    id: hub_speaker
    i2s_audio_id: i2s_spk_bus
    i2s_dout_pin: GPIO15     # DIN (Data In of MAX98357A)
    dac_type: external       # external DAC (integrated in MAX98357A)
    i2s_mode: primary        # ESP32 is the I2S bus master

# ── UART → ESP32-C6 ──────────────────────────────────────────
# UART is a point-to-point serial protocol.
# CROSSED wiring (TX of one → RX of the other):
#   S3 TX GPIO17 → C6 RX
#   S3 RX GPIO16 ← C6 TX
#   Common GND is mandatory!
uart:
  id: uart_c6
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 115200

# ── PACKET TRANSPORT ─────────────────────────────────────────
# Enables direct ESP-to-ESP communication without an MQTT broker.
# The S3 is the "consumer": receives sensors from the C6.
# The C6 is the "provider": sends its sensors to this device.
# The name in providers must match esphome.name of the C6.
packet_transport:
  - platform: uart          # physical transport: UART
    id: pt_from_c6
    uart_id: uart_c6
    providers:
      - name: hub-thread-node   # = esphome.name in hub_thread_node.yaml

# ── ON-BOARD WS2812 RGB LED (GPIO48) ────────────────────────
# The ESP32-S3-DevKitC-1 has a WS2812 LED directly on the PCB
# connected to GPIO48. No external resistor or power supply needed:
# everything is already integrated on the board.
# rgb_order: GRB → WS2812 LEDs use G-R-B order (not RGB!).
light:
  - platform: esp32_rmt_led_strip
    id: rgb_led
    pin: GPIO48              # WS2812 LED on-board the S3 devkit
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    name: "Hub Status LED"
    icon: "mdi:led-outline"
    restore_mode: ALWAYS_OFF
    default_transition_length: 300ms
    effects:
      - pulse:
          name: eff_pulse_slow
          transition_length: 1500ms
          update_interval: 2000ms
      - pulse:
          name: eff_pulse_fast
          transition_length: 300ms
          update_interval: 500ms
      - pulse:
          name: eff_breath
          transition_length: 2000ms
          update_interval: 2500ms
          min_brightness: 10%
          max_brightness: 80%

# ── FONTS ────────────────────────────────────────────────────
# ESPHome downloads fonts from Google Fonts at compile time.
# "gfonts://" references Google Fonts. "@700" = bold weight.
# Alternative format: file: "/config/fonts/Roboto.ttf" (local).
font:
  - file: "gfonts://Roboto"
    id: font_small
    size: 10
  - file: "gfonts://Roboto@700"
    id: font_bold
    size: 14
  - file: "gfonts://Roboto@700"
    id: font_big
    size: 18

# ── GLOBAL VARIABLES ─────────────────────────────────────────
# Globals persist in RAM for the entire runtime.
# restore_value: yes → value is saved in flash NVS and
#   restored after a reboot.
globals:
  - id: dnd_active
    type: bool
    restore_value: yes        # remembered across reboots
    initial_value: 'false'
  - id: display_lux           # last brightness reading
    type: float
    restore_value: no
    initial_value: '100.0'
  # hub_state: current device state.
  # Used by LED scripts and display lambda.
  # 0=idle, 1=listening, 2=DND, 3=no_wifi, 4=active/reply
  - id: hub_state
    type: int
    restore_value: no
    initial_value: '0'
  # List of BLE devices found during the last scan.
  # Populated by esp32_ble_tracker.on_ble_advertise, cleared
  # every 15s by the interval block (or by the "BLE: Scan now" button).
  - id: ble_scan_results
    type: std::string
    restore_value: no
    initial_value: '""'
  # Current volume level (0.0–1.0), mirrored from vol_level.
  # restore_value: yes → remembered across reboots via flash NVS.
  - id: vol_value
    type: float
    restore_value: yes
    initial_value: '0.5'

# ============================================================
#  SCRIPTS
#  Scripts are reusable action sequences.
#  To invoke them: script.execute: script_name
#  mode: single  → if already running, ignore new calls
#  mode: restart → if called again, restart from the beginning
# ============================================================
script:
  # ── IDLE: soft blue breathing ────────────────────────────
  - id: led_stato_riposo
    mode: single
    then:
      - logger.log: "State: IDLE — blue breathing LED"
      - lambda: id(hub_state) = 0;
      - light.turn_on:
          id: rgb_led
          effect: eff_breath
          red: 0%
          green: 10%
          blue: 100%
          brightness: 35%

  # ── LISTENING: bright violet solid ─────────────────────
  - id: led_stato_ascolto
    mode: single
    then:
      - logger.log: "State: LISTENING — violet LED"
      - lambda: id(hub_state) = 1;
      - light.turn_on:
          id: rgb_led
          effect: none
          red: 80%
          green: 0%
          blue: 100%
          brightness: 80%

  # ── DND: slow orange pulse ──────────────────────────────
  - id: led_stato_dnd
    mode: single
    then:
      - logger.log: "State: DND — orange LED"
      - lambda: id(hub_state) = 2;
      - light.turn_on:
          id: rgb_led
          effect: eff_pulse_slow
          red: 100%
          green: 40%
          blue: 0%
          brightness: 30%

  # ── NO WIFI: fast red pulse ─────────────────────────────
  - id: led_stato_no_wifi
    mode: single
    then:
      - logger.log:
          level: WARN
          format: "State: NO WIFI — red fast blink"
      - lambda: id(hub_state) = 3;
      - light.turn_on:
          id: rgb_led
          effect: eff_pulse_fast
          red: 100%
          green: 0%
          blue: 0%
          brightness: 80%

  # ── ACTIVE / TTS reply: solid green ────────────────────
  - id: led_stato_attivo
    mode: single
    then:
      - logger.log: "State: ACTIVE — green LED"
      - lambda: id(hub_state) = 4;
      - light.turn_on:
          id: rgb_led
          effect: none
          red: 0%
          green: 100%
          blue: 20%
          brightness: 60%

  # ── Evaluate display brightness at boot ────────────────
  # If it is already dark at boot (lux<5), turn off the display.
  - id: valuta_display
    mode: single
    then:
      - lambda: |-
          if (id(display_lux) < 5.0)
            id(oled).set_brightness(0.0);

  # ── Display inactivity timer ────────────────────────────
  # mode: restart → every button press resets the timer.
  # After 1 minute of no interaction, dims the display brightness.
  - id: timer_inattivita
    mode: restart
    then:
      - lambda: |-
          if (id(display_lux) >= 5.0)
            id(oled).set_brightness(1.0);   // restore to 100%
      - delay: 1min
      - lambda: |-
          if (id(display_lux) >= 5.0)
            id(oled).set_brightness(0.15);   // night dimmer

  # ── BLE delayed start ─────────────────────────────────
  # Waits 15s (= the BLE scan clear interval) before enabling
  # the BLE tracker. This prevents the scanner from consuming
  # internal RAM during boot, leaving room for micro_wake_word
  # to allocate its TFLite tensor arena (~17 KB).
  - id: ble_delayed_start
    mode: single
    then:
      - delay: 15s
      - esp32_ble_tracker.start_scan:
          continuous: true
      - logger.log: "BLE: scan started (delayed 15s after boot)"

  # ── VOLUME FEEDBACK: white LED → brightness = volume ───
  # mode: restart → if volume changes again within 3s, the
  # countdown resets (no flicker during rapid adjustments).
  # After 3s the LED returns to whichever state was active
  # before (hub_state: 0=idle, 1=listening, 2=DND,
  # 3=no_wifi, 4=active/reply).
  - id: led_mostra_volume
    mode: restart
    then:
      - light.turn_on:
          id: rgb_led
          effect: none
          red: 100%
          green: 100%
          blue: 100%
          brightness: !lambda return max(0.05f, id(vol_level).state);
      - delay: 3s
      - lambda: |-
          switch (id(hub_state)) {
            case 1: id(led_stato_ascolto)->execute(); break;
            case 2: id(led_stato_dnd)->execute();    break;
            case 3: id(led_stato_no_wifi)->execute(); break;
            case 4: id(led_stato_attivo)->execute();  break;
            default: id(led_stato_riposo)->execute(); break;
          }

# -- SENSORS ------------------------------------------------
sensor:
  # BME280: temperature, humidity, pressure.
  # address: 0x76 if SDO is at GND, 0x77 if at VCC.
  # Check the log at boot (scan: true above) to find
  #   the real address if this gives a "Wrong chip ID" error.
  # filters offset: the BME280 heats up slightly during use
  #   --> subtract 1.5 C to get closer to the real temperature.
  - platform: bme280_i2c
    address: 0x76
    update_interval: 30s
    temperature:
      id: bme_temp
      name: "Temperatura Ambiente"
      filters:
        - offset: -1.5   # self-heating compensation
    humidity:
      id: bme_hum
      name: "Umidità Ambiente"
    pressure:
      id: bme_pres
      name: "Pressione Ambiente"

  # BH1750: ambient light sensor in lux.
  # address: 0x23 if ADDR is at GND, 0x5C if at VCC.
  # on_value runs every time a new measurement arrives.
  # If light is below 5 lux (dark) we turn off the display.
  - platform: bh1750
    id: bh1750_lux
    name: "Luce Ambiente"
    address: 0x23
    update_interval: 5s
    on_value:
      then:
        - lambda: id(display_lux) = x;   // save to global variable
        - if:
            condition:
              lambda: return x < 5.0;    // is it dark?
            then:
              - lambda: id(oled).set_brightness(0.0);
              - script.stop: timer_inattivita
            else:
              - script.execute: timer_inattivita

  # Sensors received via UART from the ESP32-C6 (Thread) node.
  # remote_id: name of the sensor id in hub_thread_node.yaml.
  # internal: false → exposes the entity to Home Assistant.
  - platform: packet_transport
    provider: hub-thread-node
    id: thread_temp_remote
    remote_id: c6_temp_sensor     # id: in hub_thread_node.yaml
    internal: false
    name: "Temperatura Thread Remote"
    unit_of_measurement: "°C"
    device_class: temperature
    state_class: measurement

  - platform: packet_transport
    provider: hub-thread-node
    id: thread_hum_remote
    remote_id: c6_hum_sensor      # id: in hub_thread_node.yaml
    internal: false
    name: "Umidità Thread Remote"
    unit_of_measurement: "%"
    device_class: humidity
    state_class: measurement

  # WiFi signal: signal strength in dBm (negative: closer to
  # zero = better signal). Useful for network diagnostics.
  - platform: wifi_signal
    name: "Hub WiFi RSSI"
    update_interval: 15s

# ── TEXT SENSOR: BLE scan results ────────────────────────────
# The text_sensor exposes the BLE list in the web server (Entities tab).
# Updated every 3s during scanning and shows all devices found
# in the format: DeviceName | MAC | dBm
# The value is reset before each new scan cycle (every 15s).
text_sensor:
  - platform: template
    id: ble_devices_sensor
    name: "BLE: Dispositivi Scoperti"
    icon: "mdi:bluetooth-search"
    lambda: return id(ble_scan_results);
    update_interval: 15s

# ── PERIODIC BLE SCAN ───────────────────────────────────────
# Every 15s: clears the BLE list (new observation window).
# The deduplication in on_ble_advertise restarts from scratch.
# The "BLE: Scan now" button clears immediately without waiting.
interval:
  - interval: 15s
    then:
      - lambda: id(ble_scan_results) = "";
      - logger.log: "BLE: list cleared, new scan window"

# ── VOLUME CONTROL ─────────────────────────────────────────
# "number" creates a numeric entity controllable from HA and
# automations. optimistic: true → updates state immediately
# without waiting for hardware confirmation (useful for
# software controls like this). restore_value: yes remembers
# the volume across reboots via flash NVS.
number:
  - platform: template
    id: vol_level
    name: "Volume Hub"
    icon: "mdi:volume-high"
    min_value: 0.0
    max_value: 1.0
    step: 0.05
    initial_value: 0.5
    optimistic: true
    restore_value: yes           # remember volume after reboot
    on_value:
      then:
        - lambda: id(hub_speaker).set_volume(x); id(vol_value) = x;
        - script.execute: timer_inattivita
        - script.execute: led_mostra_volume

# ── LED BUTTONS / COMMANDS ───────────────────────────────────
# Template "button" entities are one-shot actions with no state.
# They appear as clickable buttons in the web server and HA.
button:
  # Restart device (useful to apply OTA updates)
  - platform: restart
    name: "Restart Hub"
    icon: "mdi:restart"

  # Immediately clear the BLE list for a fresh reading
  - platform: template
    name: "BLE: Scansiona ora"
    icon: "mdi:bluetooth-search"
    on_press:
      - lambda: id(ble_scan_results) = "";
      - logger.log: "BLE: manual scan started"

# ── DND SWITCH ───────────────────────────────────────────────
# Template switch: virtual switch with no physical GPIO.
# restore_mode: RESTORE_DEFAULT_OFF => always OFF at startup.
# When DND is ON: micro_wake_word stops (no wake-ups),
# voice_assistant is interrupted if in progress.
switch:
  - platform: template
    id: sw_dnd
    name: "Non Disturbare"
    icon: "mdi:bell-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      then:
        - logger.log: "DND enabled - wake word listening suspended"
        - lambda: id(dnd_active) = true;
        - micro_wake_word.stop:       # stop listening
        - voice_assistant.stop:       # interrupt session in progress
        - script.execute: led_stato_dnd
    on_turn_off:
      then:
        - logger.log: "DND disabled - resuming wake word listening"
        - lambda: id(dnd_active) = false;
        - micro_wake_word.start:
        - script.execute: led_stato_riposo

# ── PHYSICAL BUTTONS ──────────────────────────────────────────
# platform: gpio => reads from a digital pin.
# mode: INPUT_PULLUP => internal pull-up resistor enabled
#   (pin normally HIGH, goes LOW when button is pressed).
# inverted: true => inverts logic (LOW=pressed => true).
# delayed_on: 20ms => debounce: signal must be stable for
#   20ms before being considered valid (avoids false reads).
binary_sensor:
  # DND Button - momentary toggle
  - platform: gpio
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
      inverted: true
    name: "Pulsante DND"
    filters:
      - delayed_on: 20ms
    on_press:
      then:
        - if:
            condition:
              switch.is_on: sw_dnd
            then:
              - switch.turn_off: sw_dnd
            else:
              - switch.turn_on: sw_dnd
        - script.execute: timer_inattivita

  # Vol+
  - platform: gpio
    pin:
      number: GPIO5
      mode: INPUT_PULLUP
      inverted: true
    name: "Vol+"
    filters:
      - delayed_on: 20ms
    on_press:
      then:
        - number.set:
            id: vol_level
            value: !lambda |-
              float v = id(vol_level).state + 0.1;
              return v > 1.0 ? 1.0 : v;
        - script.execute: timer_inattivita

  # Vol-
  - platform: gpio
    pin:
      number: GPIO6
      mode: INPUT_PULLUP
      inverted: true
    name: "Vol-"
    filters:
      - delayed_on: 20ms
    on_press:
      then:
        - number.set:
            id: vol_level
            value: !lambda |-
              float v = id(vol_level).state - 0.1;
              return v < 0.0 ? 0.0 : v;
        - script.execute: timer_inattivita

  # Pulsante Assistente — click singolo avvia
  - platform: gpio
    pin:
      number: GPIO7
      mode: INPUT_PULLUP
      inverted: true
    name: "Pulsante Assistente"
    filters:
      - delayed_on: 20ms
    on_press:
      then:
        - if:
            condition:
              switch.is_on: sw_dnd
            then:
              - logger.log: "Blocked: DND is active"
            else:
              - voice_assistant.start:
        - script.execute: timer_inattivita

  # Remote button received via UART from the C6 node.
  # Works like a local GPIO but the signal arrives via
  # packet_transport over the UART bus.
  - platform: packet_transport
    provider: hub-thread-node
    id: thread_button_remote
    remote_id: c6_test_button     # id: in hub_thread_node.yaml
    internal: false
    name: "Pulsante Thread Remote"

  # platform: status → true when the HA API is connected.
  - platform: status
    name: "Hub Connesso"

# ============================================================
#  DISPLAY — faces drawn with graphics primitives
#  Layout 128x64:
#    Left column   (0..54):   face 54x54 px centred
#    Right column (58..127): sensor data
# ============================================================
display:
  - platform: ssd1306_i2c
    id: oled
    model: "SSD1306 128x64"
    address: 0x3C
    brightness: 100%
    update_interval: 3s    # 3s to animate the eyes
    lambda: |-
      // ── Dati a destra ──────────────────────────────────
      it.printf(60, 0,  id(font_bold),  "%.1f C", id(bme_temp).state);
      it.printf(60, 16, id(font_small), "%.0f%%", id(bme_hum).state);
      it.printf(60, 28, id(font_small), "%.0fhPa", id(bme_pres).state);
      it.printf(60, 40, id(font_small), "Lux:%.0f", id(bh1750_lux).state);
      it.printf(60, 52, id(font_small), "Vol:%.0f%%", id(vol_level).state * 100);

      // Vertical divider line
      it.vertical_line(56, 0, 64);

      // ── Viso a sinistra (area 54x64, centro cx=27 cy=32) ─
      // hub_state: 0=idle, 1=listening, 2=DND, 3=no_wifi, 4=active
      int cx = 27, cy = 30;
      int state = id(hub_state);

      // Head (circle common to all faces)
      it.circle(cx, cy, 22);

      if (state == 0) {
        // -- IDLE: half-moon eyes (sleepy) --------------------
        // Left eye: upper arc = filled semicircle
        it.filled_circle(cx - 8, cy - 3, 4);
        it.filled_rectangle(cx - 12, cy - 3, 9, 5); // covers lower half
        it.circle(cx - 8, cy - 3, 4);               // redraw border
        // Right eye
        it.filled_circle(cx + 8, cy - 3, 4);
        it.filled_rectangle(cx + 4, cy - 3, 9, 5);
        it.circle(cx + 8, cy - 3, 4);
        // Mouth: neutral horizontal line
        it.line(cx - 8, cy + 11, cx + 8, cy + 11);

      } else if (state == 1) {
        // -- LISTENING: wide-open eyes, 'O' mouth ------------------
        it.filled_circle(cx - 8, cy - 3, 5);
        it.filled_circle(cx + 8, cy - 3, 5);
        // Pupils (white dots = off pixels = white on black OLED)
        it.filled_circle(cx - 8, cy - 3, 2);  // dark pupil
        it.filled_circle(cx + 8, cy - 3, 2);
        // Mouth: open circle (surprise/listening)
        it.circle(cx, cy + 11, 5);

      } else if (state == 2) {
        // -- DND: X eyes, downturned mouth ------------------
        // Left eye: X
        it.line(cx - 11, cy - 7, cx - 5, cy - 1);
        it.line(cx - 5,  cy - 7, cx - 11, cy - 1);
        // Right eye: X
        it.line(cx + 5,  cy - 7, cx + 11, cy - 1);
        it.line(cx + 11, cy - 7, cx + 5,  cy - 1);
        // Mouth: downward curve (sad)
        it.line(cx - 8, cy + 12, cx - 4, cy + 15);
        it.line(cx - 4, cy + 15, cx + 4, cy + 15);
        it.line(cx + 4, cy + 15, cx + 8, cy + 12);

      } else if (state == 3) {
        // ── NO WIFI: spiral eyes (dizzy), open mouth ─
        // Left eye: concentric circles
        it.circle(cx - 8, cy - 3, 5);
        it.circle(cx - 8, cy - 3, 2);
        it.filled_circle(cx - 8, cy - 3, 1);
        // Right eye
        it.circle(cx + 8, cy - 3, 5);
        it.circle(cx + 8, cy - 3, 2);
        it.filled_circle(cx + 8, cy - 3, 1);
        // Mouth: zigzag (confused)
        it.line(cx - 8, cy + 10, cx - 4, cy + 14);
        it.line(cx - 4, cy + 14, cx,     cy + 10);
        it.line(cx,     cy + 10, cx + 4, cy + 14);
        it.line(cx + 4, cy + 14, cx + 8, cy + 10);

      } else if (state == 4) {
        // ── ACTIVE / REPLY: star eyes, smiling mouth ─
        // Left eye: star (rays from centre)
        it.filled_circle(cx - 8, cy - 3, 4);
        it.line(cx - 8, cy - 8,  cx - 8, cy + 2);  // vertical
        it.line(cx - 13, cy - 3, cx - 3, cy - 3);  // horizontal
        it.line(cx - 11, cy - 6, cx - 5, cy);      // diagonal /
        it.line(cx - 5,  cy - 6, cx - 11, cy);     // diagonal \
        // Right eye
        it.filled_circle(cx + 8, cy - 3, 4);
        it.line(cx + 8,  cy - 8,  cx + 8, cy + 2);
        it.line(cx + 3,  cy - 3,  cx + 13, cy - 3);
        it.line(cx + 5,  cy - 6,  cx + 11, cy);
        it.line(cx + 11, cy - 6,  cx + 5,  cy);
        // Mouth: curved smile
        it.line(cx - 8, cy + 10, cx - 5, cy + 14);
        it.line(cx - 5, cy + 14, cx,     cy + 15);
        it.line(cx,     cy + 15, cx + 5, cy + 14);
        it.line(cx + 5, cy + 14, cx + 8, cy + 10);
      }

      // State label below the face
      if (state == 0) it.printf(1, 56, id(font_small), "RIPOSO");
      if (state == 1) it.printf(1, 56, id(font_small), "ASCOLTO");
      if (state == 2) it.printf(1, 56, id(font_small), "DND");
      if (state == 3) it.printf(1, 56, id(font_small), "NO WIFI");
      if (state == 4) it.printf(1, 56, id(font_small), "ATTIVO");

# ── MICRO WAKE WORD ──────────────────────────────────────────
# Detects the wake word directly on the device (on-device),
# without sending audio to the cloud.
# The TFLite model is downloaded from the ESPHome repository
# at compile time.
# Simple names ("hey_jarvis") are no longer accepted in recent
# versions of ESPHome: use the full GitHub path instead.
# Format: github://<org>/<repo>/path/to/file.json@<branch>
# The v2 model is more accurate than v1 (fewer false positives).
# The model tensor arena is allocated in PSRAM thanks to
# CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL set above.
micro_wake_word:
  microphone:
    microphone: hub_mic    # use the microphone defined above
    channels: 0            # channel 0 = left (INMP441)
  models:
    - model: github://esphome/micro-wake-word-models/models/v2/hey_jarvis.json@main
  on_wake_word_detected:
    then:
      - logger.log: "Wake word detected: starting voice assistant"
      - voice_assistant.start:
      - script.execute: timer_inattivita

# ── VOICE ASSISTANT ──────────────────────────────────────────
# Sends audio to Home Assistant, which processes it with Assist.
# Requires HA 2023.5+ with an Assist pipeline configured.
# noise_suppression_level: 0-4, reduces background noise.
# auto_gain: 0-31dBFS, automatic microphone gain.
# volume_multiplier: multiplies the input audio volume.
voice_assistant:
  id: va
  microphone:
    microphone: hub_mic
    channels: 0
  speaker: hub_speaker
  noise_suppression_level: 2    # medium noise suppression level
  auto_gain: 31dBFS             # maximum automatic gain
  volume_multiplier: 4.0        # amplify microphone input
  on_listening:
    then:
      - logger.log: "Voice assistant: listening — BLE scan paused"
      # Free the 2.4GHz radio for audio: during microphone listening
      # BLE/WiFi radio contention causes audio dropouts.
      # The BLE proxy will reject new connections until start_scan
      # (called in on_end / on_error), but commands already sent
      # to a connected device are not interrupted.
      - esp32_ble_tracker.stop_scan:
      - script.execute: led_stato_ascolto
  on_stt_end:
    then:
      - logger.log:              # log the recognised sentence
          format: "STT: %s"
          args: [x]
      - script.execute: led_stato_attivo
  on_tts_start:
    then:
      - logger.log:              # log the response text
          format: "TTS: %s"
          args: [x]
      - script.execute: led_stato_attivo
  on_end:
    then:
      # Wait for the TTS audio to finish before restarting wake word
      - wait_until:
          not:
            voice_assistant.is_running:
      # Voice session complete: resume BLE scan.
      - esp32_ble_tracker.start_scan:
      - if:
          condition:
            switch.is_off: sw_dnd
          then:
            - micro_wake_word.start:
            - script.execute: led_stato_riposo
          else:
            - script.execute: led_stato_dnd
  on_error:
    then:
      - logger.log:
          level: WARN
          format: "Voice assistant error: %s — %s"
          args: [code, message]
      # Even on error, resume BLE scan.
      - esp32_ble_tracker.start_scan:
      - if:
          condition:
            switch.is_off: sw_dnd
          then:
            - micro_wake_word.start:
            - script.execute: led_stato_riposo
          else:
            - script.execute: led_stato_dnd
