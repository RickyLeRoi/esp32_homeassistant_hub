# ============================================================
#  THREAD NODE — ESP32-C6
#  Does NOT connect to WiFi — communicates only via UART with S3
# ============================================================

substitutions:
  device_name: hub-thread-node
  friendly_name: "Hub Thread Node"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  framework:
    type: esp-idf

logger:
  level: INFO
  baud_rate: 0

# ── UART → ESP32-S3 ──────────────────────────────────────────
# CROSSED wiring:
#   C6 TX GPIO16 → S3 RX GPIO16
#   C6 RX GPIO17 → S3 TX GPIO17
#   GND → GND common (mandatory)
uart:
  id: uart_to_s3
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 115200

packet_transport:
  - platform: uart
    id: pt_to_s3
    uart_id: uart_to_s3
    sensors:
      - c6_temp_sensor
      - c6_hum_sensor
    binary_sensors:
      - c6_test_button

i2c:
  sda: GPIO2
  scl: GPIO3
  scan: true

sensor:
  - platform: sht3xd       # o bme280_i2c
    address: 0x44
    update_interval: 30s
    temperature:
      id: c6_temp_sensor
      name: "Temperatura Thread"
      filters:
        - offset: -1.0
    humidity:
      id: c6_hum_sensor
      name: "Umidità Thread"

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO9
      mode: INPUT_PULLUP
      inverted: true
    id: c6_test_button
    name: "Pulsante C6"
    filters:
      - delayed_on: 20ms

light:
  - platform: esp32_rmt_led_strip
    id: status_led_c6
    pin: GPIO6
    num_leds: 1
    rgb_order: GRB
    chipset: WS2812
    name: "Status LED C6"
    restore_mode: ALWAYS_OFF
    effects:
      - pulse:
          name: "Pulse lento"
          transition_length: 1s
          update_interval: 2s
