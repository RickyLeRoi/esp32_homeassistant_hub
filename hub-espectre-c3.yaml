# ============================================================
#  PRESENCE DETECTION NODE — ESP32-C3
#
#  Uses ESPectre, a component that analyses WiFi CSI (Channel
#  State Information) to detect human presence without any
#  additional hardware. The ESP32-C3's WiFi radio measures
#  phase and amplitude changes in the multipath signal caused
#  by a person moving in the room.
#
#  This device connects to WiFi (required for CSI) and
#  publishes directly to Home Assistant via the native API.
#
#  IMPORTANT: On Windows, the first build after a clean cache
#  WILL FAIL due to a CMake 4.0 / ESP-IDF 5.5 compatibility
#  issue. Run compile twice — the second run always succeeds.
#  See README.md → "Troubleshooting: ESP32-C3 / ESPectre" for
#  the full explanation and PlatformIO venv setup steps.
# ============================================================

substitutions:
  device_name: hub-espectre
  friendly_name: "Hub - ESPectre"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    # esp-idf is mandatory: CSI is a low-level WiFi driver feature
    # not exposed by the Arduino framework.
    type: esp-idf
    sdkconfig_options:
      # Enable the WiFi CSI subsystem in ESP-IDF.
      # Without this the radio will not capture channel state data
      # and ESPectre will not receive any packets to analyse.
      CONFIG_ESP_WIFI_CSI_ENABLED: "y"
      # Disable the ESP-IDF power management framework entirely.
      # When PM is active the CPU can clock-gate between tasks,
      # which disrupts the timing of CSI packet collection and
      # causes the "Auth Expired" WiFi reconnection loop.
      CONFIG_PM_ENABLE: "n"
      # Disable the station-side power-save negotiation that runs
      # even when CONFIG_PM_ENABLE is off. If left enabled, the AP
      # may drop the association after a power-save timeout, causing
      # repeated disconnects and reconnects visible in the log as
      # "wifi: <ba> del BA session" / "Auth Expired".
      CONFIG_ESP_WIFI_STA_DISCONNECTED_PM_ENABLE: "n"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # Skip the full channel scan and reconnect directly to the last
  # known BSSID. Reduces reconnection time from ~5 s to <1 s and
  # avoids the Auth Expired loop that occurs during a long scan
  # while the AP is already expecting the station to be connected.
  fast_connect: true
  # Disable all WiFi power-save modes at the ESPHome level.
  # CSI capture requires the radio to be active at all times;
  # any power-save interval (even LIGHT) drops packets and
  # degrades motion detection accuracy.
  power_save_mode: none
  # Fallback AP: activated automatically if WiFi association fails
  # for more than 60 s. Allows recovery via captive portal without
  # physical access to the device.
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

# captive_portal works together with the fallback AP above:
# when the device is in AP mode, any HTTP request is redirected
# to a configuration page where WiFi credentials can be updated.
captive_portal:

# web_server exposes a lightweight dashboard on port 80.
# Useful for checking sensor values and triggering the calibration
# switch without needing Home Assistant.
web_server:
  port: 80
  version: 2
  log: true   # include live log stream in the web UI

logger:
  level: DEBUG
  # baud_rate: 115200 enables serial log output on the C3's
  # USB-Serial/JTAG peripheral (no separate UART chip needed).
  baud_rate: 115200
  logs:
    # The WiFi component logs a line for every CSI packet event;
    # at ~100 pkt/s this would flood the output. WARN keeps only
    # connection state changes.
    wifi: WARN
    # ESPectre publishes a score update every publish_interval
    # packets (~2/s). Suppress the sensor update spam.
    sensor: WARN

api:
  encryption:
    key: !secret api_key
  on_client_connected:
    then:
      - logger.log: "Home Assistant connected"
  on_client_disconnected:
    then:
      - logger.log:
          level: WARN
          format: "Home Assistant disconnected"

ota:
  - platform: esphome
    password: !secret ota_password

# ── ESPectre external component ──────────────────────────────
# Locked to a specific git tag so that upstream breaking changes
# do not affect a working deployment.
# refresh: never prevents ESPHome from re-fetching the source on
# every compile; remove it only when intentionally upgrading.
#
# To upgrade: change ref to the new tag and remove refresh: never,
# compile once, then add refresh: never back.
external_components:
  - source:
      type: git
      url: https://github.com/francescopace/espectre
      ref: "2.7.0"
    components: [espectre]
    refresh: never

# ── ESPectre configuration ───────────────────────────────────
# ESPectre passively analyses the CSI data from the packets the
# ESP32-C3 already receives as a normal WiFi station. No extra
# hardware or transmitter is required.
#
# Calibration: on first boot (or after pressing calibrate_switch)
# ESPectre samples the "empty room" baseline for a few seconds.
# Keep the room still during calibration for best accuracy.
espectre:
  # Movement score threshold for the motion binary_sensor.
  # Range: 0.0 (ultra-sensitive) to 10.0 (only large movements).
  # 1.5 is a good starting point for a living room; lower it to
  # ~0.8 for a bedroom or small office where micro-movements
  # (breathing, typing) should also trigger presence.
  segmentation_threshold: 1.5

  # How often to update the movement_sensor score, expressed as
  # a packet count (not a time duration).
  # At ~100 pkt/s, 50 packets ≈ 0.5 s update interval.
  # Lower values increase responsiveness but add CPU overhead.
  publish_interval: 50

  # Binary sensor: ON when movement score exceeds the threshold.
  # Mapped to device_class: motion so HA treats it as a standard
  # motion sensor (icon, history graph, etc.).
  motion_sensor:
    name: "Presenza Terra"
    device_class: motion

  # Numeric sensor: the raw movement score scaled to 0–100.
  # multiply: 100 converts the 0.0–1.0 internal score to percent.
  # clamp ensures the value stays in the valid HA sensor range
  # even if the raw score briefly exceeds 1.0 during fast motion.
  movement_sensor:
    name: "Movimento Terra (score)"
    filters:
      - multiply: 100
      - clamp:
          min_value: 0
          max_value: 100

  # Momentary switch exposed to HA: pressing it triggers a new
  # baseline calibration without rebooting the device.
  # Use it after rearranging furniture or if false positives appear.
  calibrate_switch:
    name: "Ricalibra Terra"